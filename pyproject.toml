[build-system]
requires = ["maturin>=1.9,<2.0"]
build-backend = "maturin"

[project]
name = "toker"
requires-python = ">=3.8"
classifiers = [
    "Programming Language :: Rust",
    "Programming Language :: Python :: Implementation :: CPython",
    "Programming Language :: Python :: Implementation :: PyPy",
]
dynamic = ["version"]
dependencies = [
    "numpy>=1.24.4",
]

[tool.maturin]

features = ["pyo3/extension-module"]
module-name = "toker.toker_rs"
python-source = "pysrc"


[tool.uv]
cache-keys = [
    { file = "pyproject.toml" },
    { file = "Cargo.toml" },
    { file = ".cargo/config.toml" },
    { file = "rust-toolchain.toml" },
    { file = "**/*.rs" },
]

[dependency-groups]
dev = [
    "ipython>=8.12.3",
    "polars>=1.8.2",
    "pytest>=8.3.5",
    "tokenizers>=0.21.0",
    "tqdm>=4.67.1",
]
