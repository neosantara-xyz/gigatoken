[package]
name = "tokers"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html
[lib]
name = "tokers"
crate-type = ["cdylib"]

[dependencies]
dashmap = { version = "6.1.0", features = ["rayon"] }
indicatif = "0.18.0"
itertools = "0.14.0"
numpy = "0.25.0"
onig = "6.5.1"
priority-queue = "2.0.2"
pyo3 = { version = "0.25.1", features = [] }
rayon = "1.10.0"
regex = "1.10.4"
unicode-properties = "0.1.3"
rand = "0.9.2"
xxhash-rust = { version = "0.8.15", features = ["xxh3", "std", "const_xxh3"] }
rustc-hash = "2.1.1"

[profile.release]
lto = "fat"
