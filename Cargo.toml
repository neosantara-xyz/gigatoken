[package]
name = "tokers"
version = "0.1.0"
edition = "2024"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html
[lib]
name = "toker_rs"
crate-type = ["cdylib", "lib"]

[features]
parquet = ["dep:polars"]

[dependencies]
dashmap = { version = "6.1", features = ["rayon"] }
indicatif = "0.18"
itertools = "0.14"
priority-queue = "2.0"
pyo3 = { version = "0.28", features = ["anyhow", "eyre"] }
rayon = "1.11"
regex = "1.12"
rand = "0.9"
# xxhash-rust = { version = "0.8.15", features = ["xxh3", "std", "const_xxh3"] }
rustc-hash = "2.1"
polars = { version = "0.52", features = ["lazy", "parquet"], optional = true }
memmap2 = { version = "0.9", features = ["stable_deref_trait"] }
base64 = "0.22"
icu = { version = "2.1", features = ["compiled_data", "datagen"] }
clap = { version = "4.5.48", features = [
    # "debug",
    "unicode",
    "derive",
    "string",
    "env",
] }
thiserror = "2.0.17"
eyre = "0.6.12"
color-eyre = "0.6.5"
winnow = { version = "0.7", features = ["simd"] }
bumpalo = { version = "3.19.1", features = ["collections", "std"] }
icu_codepointtrie_builder = { version = "0.5.1" }
zerovec = { version = "0.11.5", features = ["derive", "std"] }
voracious_radix_sort = { version = "1.2.0", features = ["voracious_multithread"] }

[profile.release]
lto = "fat"
# debug = "line-tables-only"

[dev-dependencies]
criterion = "0.8"


# [[bench]]
# name = "unicode"
# harness = false

[[bench]]
name = "pretokenize"
harness = false

[lints.rust]
unused = "allow"
