[package]
name = "tokers"
version = "0.1.0"
edition = "2024"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html
[lib]
name = "toker_rs"
crate-type = ["cdylib"]

[features]
parquet = ["dep:polars"]

[dependencies]
dashmap = { version = "6.1", features = ["rayon"] }
indicatif = "0.18"
itertools = "0.14"
priority-queue = "2.0"
pyo3 = { version = "0.26", features = [] }
rayon = "1.10"
regex = "1.10"
rand = "0.9"
# xxhash-rust = { version = "0.8.15", features = ["xxh3", "std", "const_xxh3"] }
rustc-hash = "2.1"
polars = { version = "0.51", features = ["lazy", "parquet"], optional = true }
memmap2 = { version = "0.9", features = ["stable_deref_trait"] }
base64 = "0.22"
icu = { version = "2.0", features = ["compiled_data", "datagen"] }
clap = { version = "4.5.48", features = [
    "debug",
    "unicode",
    "derive",
    "string",
    "env",
] }
thiserror = "2.0.17"
eyre = "0.6.12"
color-eyre = "0.6.5"

[profile.release]
# lto = "fat"
# debug = "line-tables-only"

[dev-dependencies]
criterion = "0.7.0"


[[bench]]
name = "unicode"
harness = false

[lints.rust]
unused = "allow"
